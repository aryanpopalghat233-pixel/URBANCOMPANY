<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBANSERVICE - Book Now</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        
        /* Tab Styling */
        .tabs { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .tab { 
            padding: 15px 25px; background: white; border: 2px solid #007bff; 
            color: #007bff; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s;
        }
        .tab.active { background: #007bff; color: white; }

        /* Worker Card Styling */
        .services-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; margin-top: 30px; 
        }
        .worker-card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #007bff;
        }
        .worker-card h3 { margin: 0 0 10px 0; color: #333; }
        .rating { color: #f39c12; font-weight: bold; }
        .price { font-size: 1.2em; color: #28a745; margin: 10px 0; }
        .btn-book { 
            width: 100%; padding: 10px; background: #007bff; color: white; 
            border: none; border-radius: 5px; cursor: pointer; 
        }

        #map { height: 300px; width: 100%; border-radius: 12px; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>URBANSERVICE</h1>
        <p>Expert services, delivered at your doorstep.</p>
    </div>

    <div class="tabs" id="categoryTabs">
        <div class="tab" onclick="loadWorkers('Beauty and Spa', this)">Beauty & Spa</div>
        <div class="tab" onclick="loadWorkers('Cleaning and Pest Control', this)">Cleaning</div>
        <div class="tab" onclick="loadWorkers('Appliance Repair', this)">Appliance Repair</div>
        <div class="tab" onclick="loadWorkers('Home Repairs', this)">Home Repairs</div>
    </div>

    <div class="services-grid" id="workerDisplay">
        <p style="text-align: center; grid-column: 1/-1;">Select a category to see available professionals.</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize Map
        var map = L.map('map').setView([28.6139, 77.2090], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. Function to fetch workers from Backend
        async function loadWorkers(category, element) {
            // UI: Highlight the active tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            const display = document.getElementById('workerDisplay');
            display.innerHTML = "Loading experts...";

            try {
                const response = await fetch(`/api/workers/category/${category}`);
                const workers = await response.json();

                display.innerHTML = ""; // Clear loading text

                if (workers.length === 0) {
                    display.innerHTML = "<p>No workers available in this category yet.</p>";
                    return;
                }

                workers.forEach(worker => {
                    const card = document.createElement('div');
                    card.className = 'worker-card';
                    card.innerHTML = `
                        <h3>${worker.name}</h3>
                        <p class="rating">⭐ ${worker.rating} / 5.0</p>
                        <p><strong>Sub-services:</strong> ${worker.subServices.join(', ')}</p>
                        <div class="price">Starting from $${worker.pricePerHour || '20'}/hr</div>
                        <button class="btn-book" onclick="bookService('${worker._id}')">Book Now</button>
                    `;
                    display.appendChild(card);
                });
            } catch (err) {
                console.error("Error fetching workers:", err);
                display.innerHTML = "Error loading workers. Please check your connection.";
            }
        }

        function bookService(id) {
            alert("Booking functionality coming next! Worker ID: " + id);
        }
    </script>
</body>
</html>
