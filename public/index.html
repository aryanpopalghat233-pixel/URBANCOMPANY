<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBANSERVICE - Book Now</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        
        /* Tab Styling */
        .tabs { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .tab { 
            padding: 15px 25px; background: white; border: 2px solid #007bff; 
            color: #007bff; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s;
        }
        .tab.active { background: #007bff; color: white; }

        /* Worker Card Styling */
        .services-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; margin-top: 30px; 
        }
        .worker-card { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #007bff;
        }
        .worker-card h3 { margin: 0 0 10px 0; color: #333; }
        .rating { color: #f39c12; font-weight: bold; }
        .price { font-size: 1.2em; color: #28a745; margin: 10px 0; }
        .btn-book { 
            width: 100%; padding: 10px; background: #007bff; color: white; 
            border: none; border-radius: 5px; cursor: pointer; 
        }

        #map { height: 300px; width: 100%; border-radius: 12px; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>URBANSERVICE</h1>
        <p>Expert services, delivered at your doorstep.</p>
    </div>

    <div class="tabs" id="categoryTabs">
        <div class="tab" onclick="loadWorkers('Beauty and Spa', this)">Beauty & Spa</div>
        <div class="tab" onclick="loadWorkers('Cleaning and Pest Control', this)">Cleaning</div>
        <div class="tab" onclick="loadWorkers('Appliance Repair', this)">Appliance Repair</div>
        <div class="tab" onclick="loadWorkers('Home Repairs', this)">Home Repairs</div>
    </div>

    <div class="services-grid" id="workerDisplay">
        <p style="text-align: center; grid-column: 1/-1;">Select a category to see available professionals.</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
// Initialize the map
var map = L.map('map').setView([0, 0], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 1. Get Customer's Location
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(position => {
        const { latitude, longitude } = position.coords;
        
        // Center map on customer
        map.setView([latitude, longitude], 13);

        // Add a special marker for the Customer
        L.marker([latitude, longitude])
            .addTo(map)
            .bindPopup("<b>You are here</b>")
            .openPopup();

        // 2. Fetch Nearby Workers from our new API
        fetch(`/api/workers/nearby?lat=${latitude}&lng=${longitude}`)
            .then(res => res.json())
            .then(workers => {
                workers.forEach(worker => {
                    // Note: GeoJSON stores [lng, lat], but Leaflet uses [lat, lng]
                    const workerLat = worker.location.coordinates[1];
                    const workerLng = worker.location.coordinates[0];

                    // Add a marker for each worker
                    L.marker([workerLat, workerLng])
                        .addTo(map)
                        .bindPopup(`
                            <strong>${worker.name}</strong><br>
                            ${worker.category}<br>
                            Rating: ⭐${worker.rating}
                        `);
                });
            });
    });
} else {
    alert("Geolocation is not supported by your browser.");
}
    </script>
</body>
</html>
