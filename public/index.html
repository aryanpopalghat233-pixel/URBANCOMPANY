<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBANSERVICE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <header class="banner">
        <h1>URBANSERVICE</h1>
        <p>Premium Professionals at Your Doorstep</p>
    </header>

    <div class="main-content">
        <div class="tabs-container">
            <div class="tab" onclick="loadWorkers('Beauty and Spa', this)">Beauty & Spa</div>
            <div class="tab" onclick="loadWorkers('Cleaning and Pest Control', this)">Cleaning</div>
            <div class="tab" onclick="loadWorkers('Appliance Repair', this)">Appliance Repair</div>
            <div class="tab" onclick="loadWorkers('Home Repairs', this)">Home Repairs</div>
        </div>

        <div id="map"></div>

        <div class="services-grid" id="workerDisplay"></div>

        <div class="apply-card">
            <h2>Join the Team</h2>
            <form class="apply-form" id="workerApplyForm">
                <input type="text" id="applyName" placeholder="Full Name" required>
                <input type="text" id="applyPhone" placeholder="Phone Number" required>
                <select id="applyCategory" class="full-width">
                    <option value="Beauty and Spa">Beauty and Spa</option>
                    <option value="Cleaning and Pest Control">Cleaning and Pest Control</option>
                    <option value="Appliance Repair">Appliance Repair</option>
                    <option value="Home Repairs">Home Repairs</option>
                </select>
                <button type="button" class="btn-apply btn-location full-width" onclick="captureLocation()">📍 Pin My Location</button>
                <p id="locStatus">Location: Not Set</p>
                <button type="submit" class="btn-apply full-width">Submit Application</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([28.6139, 77.2090], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let capturedCoords = null;

        async function captureLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                capturedCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                document.getElementById('locStatus').innerText = "✅ Location Verified";
                map.setView([capturedCoords.lat, capturedCoords.lng], 15);
                L.marker([capturedCoords.lat, capturedCoords.lng]).addTo(map).bindPopup("You are here").openPopup();
            }, () => alert("Please allow location access"), { enableHighAccuracy: true });
        }

        async function loadWorkers(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            const res = await fetch(`/api/workers/category/${encodeURIComponent(cat)}`);
            const workers = await res.json();
            const display = document.getElementById('workerDisplay');
            display.innerHTML = workers.map(w => `
                <div class="worker-card">
                    <h3>${w.name}</h3>
                    <p>⭐ ${w.rating}</p>
                    <button class="btn-book">Book Now</button>
                </div>
            `).join('') || "<p>No workers found.</p>";
        }

        document.getElementById('workerApplyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!capturedCoords) return alert("Pin your location first!");
            const data = {
                name: document.getElementById('applyName').value,
                phone: document.getElementById('applyPhone').value,
                category: document.getElementById('applyCategory').value,
                location: { type: 'Point', coordinates: [capturedCoords.lng, capturedCoords.lat] }
            };
            const res = await fetch('/api/admin/add-worker', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) alert("Live!");
        });
    </script>
</body>
</html>
